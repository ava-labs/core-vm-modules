# NPM OIDC publishing requires publishing to happen from a single
# workflow file that we set in the "Trusted Publishing" settings in NPM
# per package. This workflow will handle publishing the packages for both
# main releases and canary releases.
#
# See: https://docs.npmjs.com/trusted-publishers
name: Release

on:
  push:
    branches-ignore:
      - changeset-release/main
  workflow_dispatch:
    inputs:
      release:
        description: 'Select release type to run'
        required: true
        type: choice
        options:
          - main
          - canary

permissions:
  contents: read
  id-token: write # Required for OIDC authentication when publishing to NPM

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest # OIDC publishing currently requires GitHub-hosted runners
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Determine and print which type of run this is
      - name: Release Type
        id: release-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.release }}" in
              main|canary)
                echo "release=${{ github.event.inputs.release }}" >> "$GITHUB_OUTPUT"
                echo "Release Type (manual): ${{ github.event.inputs.release }}"
                ;;
              *)
                echo "Invalid release input: ${{ github.event.inputs.release }}" >&2
                exit 1
                ;;
            esac
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "release=main" >> "$GITHUB_OUTPUT"
            echo "Release Type: main (pnpm release)"
          else
            echo "release=canary" >> "$GITHUB_OUTPUT"
            echo "Release Type: canary publish"
          fi

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20.11.0
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: '.nvmrc'

      - name: enable corepack
        run: |
          corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # This will run all build, test, and lint scripts in parallel for all packages
      - name: Build, Test, & Lint all packages
        run: pnpm run ci

      # ------------------------------------------------
      # Canary-only steps for non-main branch pushes
      # ------------------------------------------------
      - name: Setup Local Github Actions
        if: steps.release-type.outputs.release == 'canary'
        run: pnpm run build --filter=github-actions --force

      - name: Extract Canary Subject From Branch Name
        if: steps.release-type.outputs.release == 'canary'
        id: get-canary-subject
        uses: ./packages-internal/github-actions/src/get-canary-subject

      - name: Publish to NPM (Canary)
        if: steps.release-type.outputs.release == 'canary'
        run: |
          pnpm changeset version --snapshot ${{ steps.get-canary-subject.outputs.canary-subject }}
          pnpm changeset publish --tag ${{ steps.get-canary-subject.outputs.canary-subject }}

      # ------------------------------------------------
      # "Release" steps.
      # ------------------------------------------------
      - name: Publish to NPM (Main)
        if: steps.release-type.outputs.release == 'main'
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: pnpm release
          title: 'Changesets: Versioning & Publishing'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
