name: Changeset PR

on:
  # NOTE: Need to run on a PR so that the ${{ github.head_ref }} (branch) is non-null
  pull_request:
    branches:
      - changeset-release/main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sign-commit:
    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write

    steps:
      - uses: actions/checkout@v4
        # Include the pull request ref in the checkout action to prevent merge commit
        # https://github.com/actions/checkout?tab=readme-ov-file#checkout-pull-request-head-commit-instead-of-merge-commit
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Update lock file
        run: pnpm install --lockfile-only

      # Reset all changes and do a verified commit via api
      # This is to ensure all commits are signed and the pr can be merged
      - name: Reset all changes
        run: git reset --soft $(git merge-base main changeset-release/main)

      - name: Commit and sign via api
        uses: planetscale/ghcommit-action@v0.1.43
        with:
          commit_message: 'chore: changeset release'
          repo: ${{ github.repository }}
          branch: ${{ github.head_ref || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
